<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Invaders QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; padding:20px; }
  h2 { font-size:14px; letter-spacing:2px; color:#00ffff; }
  #qr { background:#fff; padding:10px; border-radius:4px; }
  p { font-size:11px; color:rgba(255,255,255,.5); text-align:center; max-width:280px; }
</style>
</head>
<body>
<h2>// SPACE INVADERS</h2>
<div id="qr"></div>
<p>Scan with Rabbit R1 to add as a Creation</p>
<script>
const payload = JSON.stringify({
  title: "Space Invaders",
  url: "https://bitm4ps.github.io/space-invaders/",
  description: "Classic arcade game. Scroll to move, auto-fire. 3 difficulties.",
  iconUrl: "https://bitm4ps.github.io/space-invaders/",
  themeColor: "#00ffff"
});
new QRCode(document.getElementById('qr'), {
  text: payload,
  width: 220,
  height: 220,
  colorDark: '#000000',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});
</script>
</body>
</html>
